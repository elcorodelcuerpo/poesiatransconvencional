<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Proyecto Flash</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #flash-container { width: 800px; height: 600px; }
    </style>
</head>
<body>

    <!-- Usamos una etiqueta estándar de objeto para que el navegador la lea directo -->
    <div id="flash-container">
        <object data="filias2.swf" type="application/x-shockwave-flash" width="100%" height="100%">
            <param name="movie" value="filias2.swf" />
            <param name="autoplay" value="true" />
        </object>
    </div>

    <!-- Cargamos el emulador al final para que intercepte el objeto automáticamente -->
    <script src="https://unpkg.com"></script>

</body>
</html>
